<article class="simulation-card">
  <div class="card-header">
    <div>
      <p class="eyebrow">Experimento salvo</p>
      <h2>{{ simulation.name }}</h2>
    </div>

    <span class="body-badge">{{ simulation.bodies.length }} corpos</span>
  </div>

  <p class="description">
    {{ simulation.description || 'Sem descricao cadastrada.' }}
  </p>

  <dl class="meta-grid">
    <div>
      <dt>Criada</dt>
      <dd>{{ simulation.createdAt | date: 'short' }}</dd>
    </div>
    <div>
      <dt>Atualizada</dt>
      <dd>{{ simulation.updatedAt | date: 'short' }}</dd>
    </div>
  </dl>

  <div class="actions">
    <button type="button" class="ghost-button" (click)="requestView()">
      Ver detalhes
    </button>
    <button type="button" class="danger-button" (click)="requestDelete()">
      Remover
    </button>
  </div>
</article>
