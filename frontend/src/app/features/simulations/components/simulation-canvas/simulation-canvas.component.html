<section
  class="canvas-shell"
  [class.minimal]="minimalChrome"
  [class.mode-3d]="viewMode() === '3d'"
>
  @if (!minimalChrome) {
    <div class="canvas-headline">
      <div>
        <p class="eyebrow">Canvas</p>
        <h2>Cena fisica</h2>
      </div>

      <p class="caption">Clique em um elemento para focar vetores e trilhas.</p>
    </div>
  }

  <div class="canvas-frame" [class.mode-3d]="viewMode() === '3d'">
    @if (allowViewToggle) {
      <button
        type="button"
        class="view-toggle"
        [class.is-3d]="viewMode() === '3d'"
        [attr.aria-pressed]="viewMode() === '3d'"
        data-testid="canvas-view-toggle"
        (click)="toggleViewMode($event)"
      >
        <i class="view-toggle-thumb"></i>
        <span>2D</span>
        <span>3D</span>
      </button>
    }

    <canvas
      #sceneCanvas
      width="860"
      height="420"
      data-testid="scene-canvas"
      (click)="selectBody($event)"
    ></canvas>

    @if (legendItems.length) {
      <div class="legend" [class.compact]="minimalChrome" data-testid="canvas-legend">
        @for (item of legendItems; track item.key) {
          <span data-testid="canvas-legend-item">
            <i class="legend-chip {{ item.tone }}"></i>
            {{ resolveLegendLabel(item) }}
          </span>
        }
      </div>
    }

    @if (!bodies.length) {
      <div class="canvas-empty">{{ emptyMessage }}</div>
    }
  </div>
</section>
