<section class="page">
  <section class="hero-card">
    <div class="hero-copy">
      <p class="eyebrow">OrbitLab</p>
      <div class="hero-headline">
        <div>
          <h1>Digite a formula e veja o movimento</h1>
          <p class="lead">
            O sistema detecta as variaveis, monta os campos e anima o
            comportamento direto no canvas.
          </p>
        </div>

        <span class="status-chip">100% local</span>
      </div>

      <div class="tag-row" aria-label="Exemplos de formula">
        @for (preset of presets; track preset.id) {
          <button
            type="button"
            class="preset-chip"
            (click)="applyPreset(preset)"
          >
            {{ preset.heroText || preset.formula }}
          </button>
        }
      </div>
    </div>
  </section>

  <section class="builder-host">
    <app-formula-scenario-builder
      #builder
      [allowSave]="false"
    />
  </section>
</section>
