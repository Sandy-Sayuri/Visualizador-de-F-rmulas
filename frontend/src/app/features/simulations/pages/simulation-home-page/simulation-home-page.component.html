<section class="page">
  <div class="workspace-grid">
    <section class="studio-column">
      <app-formula-scenario-builder
        #builder
        [allowSave]="false"
      />
    </section>

    <aside class="support-column">
      <section class="support-panel">
        <p class="eyebrow">Fluxo</p>
        <h3>Nada depende de banco</h3>
        <div class="usage-stack">
          <article class="usage-card">
            <strong>1. Digite a formula</strong>
            <p>O analisador detecta a categoria e extrai os parametros.</p>
          </article>
          <article class="usage-card">
            <strong>2. Ajuste os valores</strong>
            <p>Os inputs aparecem dinamicamente conforme a equacao.</p>
          </article>
          <article class="usage-card">
            <strong>3. Veja a cena</strong>
            <p>O canvas anima o comportamento sem salvar nada no backend.</p>
          </article>
        </div>
      </section>
    </aside>
  </div>
</section>
